<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Flappy - Fast Edition</title>
<style>
* { box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; }
body{ margin:0; padding:0; background:#050508; display:flex; justify-content:center; align-items:center; height:100vh; width:100vw; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
canvas{ display: block; max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 25px 60px rgba(0,0,0,0.8); }
</style>
</head>
<body>

<canvas id="game" width="480" height="720"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = true;

/* ================= SLIKE I PODACI ================= */
const coinImg = new Image(); coinImg.src = "coin.png";
const logoImg = new Image(); logoImg.src = "naslovek2.png"; 

let gameState = "MENU"; 
let menuTimer = 0; 
let score = 0;
let coins = Number(localStorage.getItem("coins")) || 0;
let highscore = Number(localStorage.getItem("highscore")) || 0;

let leaderboard = JSON.parse(localStorage.getItem("flappy_leaderboard")) || [
    {name: "PRO_BIRD", score: 25},
    {name: "NEON_KING", score: 18},
    {name: "FLAPPY", score: 12},
    {name: "CHAMP", score: 8},
    {name: "PLAYER1", score: 4}
];

let countdown = 3;
let adTimer = 0;
let adInterval = null;
let adNextAvailable = Number(localStorage.getItem("adNextAvailable")) || 0; 
let shopTab = "SKINS"; 
let hasShieldEquipped = localStorage.getItem("hasShieldEquipped") === "true"; 
const shieldCost = 250; 

let activePressedButton = null; 
let flashAlpha = 0; 
let shakeTimer = 0;
let shakeIntensity = 0;
let particles = [];
let birdTrail = [];

let nameInputActive = false;
let currentEnteredName = "";
const maxNameLength = 10;

function createParticles(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            radius: Math.random() * 3 + 2,
            alpha: 1,
            color: color
        });
    }
}

const stars = Array.from({length: 30}, () => ({ 
    x: Math.random() * canvas.width, 
    y: Math.random() * canvas.height, 
    size: Math.random() * 1.5,
    speed: Math.random() * 0.04 + 0.02 
}));

const clouds = [];
for(let i=0; i<4; i++) {
    clouds.push({ 
        x: Math.random() * canvas.width, 
        y: Math.random() * 180 + 40, 
        w: Math.random() * 50 + 80, 
        h: 35, 
        speed: Math.random() * 0.10 + 0.05 
    });
}

/* ================= IGRAC & FIZIKA ================= */
const player = { x:80, y:250, w:90, h:90, vel:0, isShielded: false }; 
const gravity = 0.24; 
const jump = -5.2;    
const hitboxPadding = 18; 

let skins = [
    { name:"Classic Bird", cost:0, unlocked:true, frames:["ptica1(128).png","ptica2(128).png","ptica3(128).png"] },
    { name:"Emerald Neon", cost:20, unlocked:false, frames:["zeleni1(128).png","zeleni2(128).png","zeleni3(128).png"] },
    { name:"Cro Edition", cost:40, unlocked:false, frames:["hrv1(128).png","hrv2(128).png","hrv3(128).png"] },
    { name:"Gentleman", cost:50, unlocked:false, frames:["kapa1(128).png","kapa2(128).png","kapa3(128).png"] },
    { name:"Angry Flappy", cost:150, unlocked:false, frames:["angry.png","angry2.png","angry3.png"] }
];

let savedSkins = JSON.parse(localStorage.getItem("skins"));
if (savedSkins && savedSkins.length === skins.length) {
    skins.forEach((skin, idx) => { skin.unlocked = savedSkins[idx].unlocked; });
}

let currentSkin = Number(localStorage.getItem("currentSkin")) || 0;
let selectedSkin = currentSkin; 

let preloadedSkinImages = [];
skins.forEach((skin, sIdx) => {
    preloadedSkinImages[sIdx] = [];
    skin.frames.forEach((src) => {
        let img = new Image(); img.src = src;
        preloadedSkinImages[sIdx].push(img);
    });
});

/* ================= LEADERBOARD LOGIKA ================= */
function checkLeaderboardEligibility(finalScore) {
    if (finalScore === 0) return false;
    if (leaderboard.length < 10) return true;
    return finalScore > leaderboard[leaderboard.length - 1].score;
}

function saveToLeaderboard(playerName, finalScore) {
    leaderboard.push({name: playerName.toUpperCase().trim() || "PLAYER", score: finalScore});
    leaderboard.sort((a, b) => b.score - a.score);
    leaderboard = leaderboard.slice(0, 10);
    localStorage.setItem("flappy_leaderboard", JSON.stringify(leaderboard));
}

/* ================= CIJEVI & DIZAJN (UBRZANO) ================= */
let pipes = [];
const pipeWidth = 80;
let currentGap = 210; 
let pipeSpeed = 1.9; // POVEĆANA POČETNA BRZINA (S 1.4 na 1.9)
const pipeSpacing = 280; 

function resetGame() {
    player.y = 250; player.vel = 0; pipes = []; score = 0; countdown = 3;
    pipeSpeed = 1.9; currentGap = 210; birdTrail = []; particles = [];
    player.isShielded = hasShieldEquipped; 
    nameInputActive = false; currentEnteredName = "";
    for(let i=0; i<3; i++) createPipe(canvas.width + i*pipeSpacing);
}

function createPipe(xPos){
    let dynamicGap = Math.max(150, currentGap - (score * 1.2));
    const topHeight = Math.random()*(canvas.height - dynamicGap - 220) + 90;
    pipes.push({ 
        x:xPos, top:topHeight, bottom:topHeight+dynamicGap, 
        passed:false, coinTaken:false, coinY:topHeight+dynamicGap/2, coinFloat:Math.random() * 5 
    });
}
resetGame();

/* ================= UI CRTANJE ================= */
function drawRoundedRect(x, y, w, h, radius, fillStyle, strokeStyle = null, lineWidth = 1) {
    ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + w - radius, y); ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
    ctx.lineTo(x + w, y + h - radius); ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h); ctx.lineTo(x + radius, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - radius); ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath();
    if (fillStyle) { ctx.fillStyle = fillStyle; ctx.fill(); }
    if (strokeStyle) { ctx.strokeStyle = strokeStyle; ctx.lineWidth = lineWidth; ctx.stroke(); }
}

function drawModernButton(id, x, y, w, h, text, topColor, bottomColor, strokeColor, fontSize = "16px", isDisabled = false) {
    ctx.save();
    if (isDisabled) { topColor = "#3a3d46"; bottomColor = "#23252b"; strokeColor = "#3a3d46"; }
    let isPressed = (activePressedButton === id) && !isDisabled;
    if(isPressed) {
        ctx.translate(x + w/2, y + h/2); ctx.scale(0.95, 0.95); ctx.translate(-(x + w/2), -(y + h/2));
        topColor = adjustColorBrightness(topColor, -20); bottomColor = adjustColorBrightness(bottomColor, -20);
    }
    ctx.shadowColor = strokeColor; ctx.shadowBlur = isPressed ? 3 : 8;
    let grad = ctx.createLinearGradient(x, y, x, y + h); grad.addColorStop(0, topColor); grad.addColorStop(1, bottomColor);
    drawRoundedRect(x, y, w, h, 16, grad, strokeColor, 1.5); ctx.restore();
    ctx.fillStyle = isDisabled ? "#727885" : "white"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.font = "bold " + fontSize + " sans-serif";
    ctx.fillText(text, x + w/2, y + h/2);
}

function adjustColorBrightness(hex, percent) {
    let R = parseInt(hex.substring(1,3),16); let G = parseInt(hex.substring(3,5),16); let B = parseInt(hex.substring(5,7),16);
    R = parseInt(R * (100 + percent) / 100); G = parseInt(G * (100 + percent) / 100); B = parseInt(B * (100 + percent) / 100);
    R = R<255?R:255; G = G<255?G:255; B = B<255?B:255;
    return "#"+R.toString(16).padStart(2,'0')+G.toString(16).padStart(2,'0')+B.toString(16).padStart(2,'0');
}

function getAdStatus() {
    let now = Date.now(); let timeLeft = adNextAvailable - now;
    if (timeLeft <= 0) return { available: true, text: "WATCH AD (+50 🪙)" };
    let minutes = Math.floor(timeLeft / 60000); let seconds = Math.floor((timeLeft % 60000) / 1000);
    return { available: false, text: `WAIT ${minutes}m ${seconds}s` };
}

function watchAd() {
    if (!getAdStatus().available) return; 
    gameState = "WATCHING_AD"; adTimer = 5; 
    adInterval = setInterval(() => {
        adTimer--;
        if(adTimer <= 0) {
            clearInterval(adInterval); coins += 50; adNextAvailable = Date.now() + (5 * 60 * 1000);
            localStorage.setItem("adNextAvailable", adNextAvailable); localStorage.setItem("coins", coins);
            gameState = "SHOP"; flashAlpha = 0.5; createParticles(canvas.width/2, canvas.height/2, "#ffd700", 40); 
        }
    }, 1000);
}

/* ================= INPUT OBRADA ================= */
function handleJumpAction() {
    if (gameState === "PLAYING" && !nameInputActive) {
        player.vel = jump;
        createParticles(player.x + player.w/4, player.y + player.h/2, "rgba(255,255,255,0.4)", 3);
    }
}

function changeSelectedSkin(dir) {
    selectedSkin += dir;
    if (selectedSkin < 0) selectedSkin = skins.length - 1;
    if (selectedSkin >= skins.length) selectedSkin = 0;
    createParticles(canvas.width/2, 330, "rgba(255,255,255,0.15)", 8);
}

function processInputStart(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (clientX - rect.left) * scaleX;
    const my = (clientY - rect.top) * scaleY;

    if (nameInputActive) {
        if(mx > 140 && mx < 340 && my > 420 && my < 470) activePressedButton = "SUBMIT_NAME";
        return;
    }

    if(gameState === "MENU") {
        if(mx > 140 && mx < 340 && my > 340 && my < 395) activePressedButton = "PLAY";
        else if(mx > 140 && mx < 340 && my > 415 && my < 470) activePressedButton = "SHOP_OPEN";
        else if(mx > 140 && mx < 340 && my > 490 && my < 545) activePressedButton = "RANK_OPEN";
    } else if(gameState === "SHOP") {
        if(mx > 28 && mx < 118 && my > 27 && my < 67) activePressedButton = "SHOP_BACK";
        if(mx > 25 && mx < 235 && my > 95 && my < 135) { shopTab = "SKINS"; flashAlpha = 0.15; }
        if(mx > 245 && mx < 455 && my > 95 && my < 135) { shopTab = "POWERUPS"; flashAlpha = 0.15; }

        if(getAdStatus().available && mx > 25 && mx < 455 && my > 550 && my < 605) activePressedButton = "WATCH_AD_BTN";

        if(shopTab === "SKINS") {
            if(mx > 10 && mx < 90 && my > 280 && my < 380) activePressedButton = "PREV_SKIN";
            if(mx > 390 && mx < 470 && my > 280 && my < 380) activePressedButton = "NEXT_SKIN";
            if (mx > 25 && mx < canvas.width-25 && my > 625 && my < 685) activePressedButton = "SHOP_ACTION";
        } else {
            if (mx > 25 && mx < canvas.width-25 && my > 625 && my < 685 && !hasShieldEquipped && coins >= shieldCost) activePressedButton = "BUY_SHIELD";
        }
    } else if(gameState === "LEADERBOARD") {
        if(mx > 30 && mx < 125 && my > 25 && my < 65) activePressedButton = "RANK_BACK";
    } else if(gameState === "PLAYING") {
        handleJumpAction();
    } else if(gameState === "GAMEOVER") {
        if(mx > 140 && mx < 340 && my > 390 && my < 440) activePressedButton = "RESTART";
        else if(mx > 140 && mx < 340 && my > 455 && my < 505) activePressedButton = "GO_MENU";
    }
}

function processInputEnd() {
    if (!activePressedButton) return;
    flashAlpha = 0.15; 

    if (activePressedButton === "SUBMIT_NAME") {
        saveToLeaderboard(currentEnteredName || "PLAYER", score);
        nameInputActive = false;
    }
    else if (activePressedButton === "PLAY") startCountdown();
    else if (activePressedButton === "SHOP_OPEN") gameState = "SHOP";
    else if (activePressedButton === "RANK_OPEN") gameState = "LEADERBOARD";
    else if (activePressedButton === "SHOP_BACK" || activePressedButton === "RANK_BACK" || activePressedButton === "GO_MENU") gameState = "MENU";
    else if (activePressedButton === "PREV_SKIN") changeSelectedSkin(-1);
    else if (activePressedButton === "NEXT_SKIN") changeSelectedSkin(1);
    else if (activePressedButton === "SHOP_ACTION") buyOrEquipSkin(selectedSkin);
    else if (activePressedButton === "BUY_SHIELD") buyShield();
    else if (activePressedButton === "RESTART") { resetGame(); startCountdown(); }
    else if (activePressedButton === "WATCH_AD_BTN") watchAd();

    activePressedButton = null; 
}

canvas.addEventListener("touchstart", e => { e.preventDefault(); processInputStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
canvas.addEventListener("touchend", e => { e.preventDefault(); processInputEnd(); }, {passive: false});
canvas.addEventListener("mousedown", e => { processInputStart(e.clientX, e.clientY); });
canvas.addEventListener("mouseup", e => { processInputEnd(); });

window.addEventListener("keydown", e => { 
    if (nameInputActive) {
        if (e.key === "Enter") {
            saveToLeaderboard(currentEnteredName || "PLAYER", score);
            nameInputActive = false;
        } else if (e.key === "Backspace") {
            currentEnteredName = currentEnteredName.slice(0, -1);
        } else if (e.key.length === 1 && currentEnteredName.length < maxNameLength && /[a-zA-Z0-9_]/.test(e.key)) {
            currentEnteredName += e.key;
        }
        return;
    }

    if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault(); 
        if (gameState !== "SHOP" && gameState !== "LEADERBOARD" && gameState !== "WATCHING_AD") handleJumpAction(); 
        if (gameState === "MENU") startCountdown();
        else if (gameState === "GAMEOVER") { resetGame(); startCountdown(); }
    }
});

function buyOrEquipSkin(index){
    const s = skins[index];
    if(!s.unlocked && coins >= s.cost){ coins -= s.cost; s.unlocked = true; createParticles(canvas.width/2, 330, "#00ff88", 35); }
    if(s.unlocked){ currentSkin = index; }
    localStorage.setItem("coins", coins); localStorage.setItem("currentSkin", currentSkin); localStorage.setItem("skins", JSON.stringify(skins));
}

function buyShield() {
    coins -= shieldCost; hasShieldEquipped = true;
    localStorage.setItem("coins", coins); localStorage.setItem("hasShieldEquipped", "true");
    createParticles(canvas.width/2, 270, "#00d2ff", 35); 
}

function triggerGameOver() {
    gameState = "GAMEOVER"; shakeTimer = 15; shakeIntensity = 8;
    createParticles(player.x + player.w/2, player.y + player.h/2, "#ff3333", 25);
    
    // MAKNUT POP-UP S PROMPTOM: Sada se samo pali unutarigraći prozor, bez škljocanja browsera!
    if (checkLeaderboardEligibility(score)) {
        nameInputActive = true;
        currentEnteredName = "";
    }
}

function startCountdown() {
    gameState = "STARTING"; countdown = 3;
    let timer = setInterval(() => { countdown--; if(countdown <= 0) { gameState = "PLAYING"; clearInterval(timer); } }, 1000);
}

/* ================= REFRESH LOGIKA ================= */
let currentFrame = 0, frameTimer = 0;

function update(){
    menuTimer += 0.04;
    if (shakeTimer > 0) shakeTimer--;
    if (flashAlpha > 0) flashAlpha -= 0.04;

    particles.forEach((p, index) => {
        p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
        if (p.alpha <= 0) particles.splice(index, 1);
    });

    if(gameState !== "PLAYING" || nameInputActive) return;
    
    // Brže i dinamičnije ubrzavanje tempa kako score raste
    pipeSpeed = 1.8 + (score * 0.04);
    player.vel += gravity; player.y += player.vel;
    frameTimer++; if(frameTimer > 5) { currentFrame = (currentFrame + 1) % 3; frameTimer = 0; }
    
    birdTrail.push({x: player.x + 20, y: player.y + player.h/2});
    if(birdTrail.length > 10) birdTrail.shift();

    clouds.forEach(c => { c.x -= c.speed; if(c.x + c.w < -50) { c.x = canvas.width + 50; c.y = Math.random()*180+40; } });

    pipes.forEach((p, index) => {
        p.x -= pipeSpeed; p.coinFloat += 0.06;
        const hX = player.x + hitboxPadding, hY = player.y + hitboxPadding;
        const hW = player.w - hitboxPadding*2, hH = player.h - hitboxPadding*2;
        
        if(hX < p.x + pipeWidth && hX + hW > p.x && (hY < p.top || hY + hH > p.bottom)) { 
            if(player.isShielded) {
                player.isShielded = false; hasShieldEquipped = false; localStorage.setItem("hasShieldEquipped", "false");
                shakeTimer = 20; shakeIntensity = 12; createParticles(p.x + pipeWidth/2, player.y + player.h/2, "#00d2ff", 30); 
                pipes.splice(index, 1); createPipe(pipes[pipes.length-1].x + pipeSpacing);
            } else { triggerGameOver(); }
        }
        if(!p.coinTaken && player.x < p.x+pipeWidth && player.x+player.w > p.x-10 && player.y < p.coinY+40 && player.y+player.h > p.coinY-20){
            coins++; p.coinTaken = true; localStorage.setItem("coins", coins); createParticles(p.x + pipeWidth/2, p.coinY, "#ffd700", 12); 
        }
        if(!p.passed && player.x > p.x + pipeWidth){ score++; p.passed = true; }
    });

    if(pipes.length > 0 && pipes[0].x + pipeWidth < 0){ pipes.shift(); createPipe(pipes[pipes.length-1].x + pipeSpacing); }
    if(player.y < -20 || player.y + player.h > canvas.height - 10) { 
        if(player.isShielded) { player.isShielded = false; hasShieldEquipped = false; localStorage.setItem("hasShieldEquipped", "false"); }
        triggerGameOver(); 
    }
    if(score > highscore) { highscore = score; localStorage.setItem("highscore", highscore); }
}

/* ================= RENDERING OKOLINA ================= */
function draw(){
    ctx.save();
    if (shakeTimer > 0) { ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity); }
    
    let nightFactor = Math.max(0, Math.sin((score / 25) * Math.PI * 2 - Math.PI/2) * 0.5 + 0.5);
    if (score < 4) nightFactor = 0;
    ctx.fillStyle = `rgb(${Math.floor(54 + (10 - 54) * nightFactor)}, ${Math.floor(180 + (15 - 180) * nightFactor)}, ${Math.floor(240 + (35 - 240) * nightFactor)})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if(nightFactor > 0.2) { 
        ctx.save(); ctx.globalAlpha = (nightFactor - 0.2) / 0.8; ctx.fillStyle = "white"; 
        stars.forEach(s => { s.x -= s.speed; if(s.x < 0) s.x = canvas.width; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); }); 
        ctx.restore();
    }
    if(nightFactor < 0.8) {
        ctx.save(); ctx.globalAlpha = (1 - nightFactor) * 0.8; 
        clouds.forEach(c => { drawRoundedRect(c.x, c.y, c.w, c.h, 15, "rgba(245, 245, 250, 0.9)"); });
        ctx.restore();
    }

    pipes.forEach(p => {
        let topGrad = ctx.createLinearGradient(p.x, 0, p.x + pipeWidth, 0); topGrad.addColorStop(0, "#2ecc71"); topGrad.addColorStop(1, "#27ae60");
        ctx.fillStyle = topGrad; ctx.fillRect(p.x, 0, pipeWidth, p.top);
        ctx.fillRect(p.x, p.bottom, pipeWidth, canvas.height-p.bottom);
        drawRoundedRect(p.x-4, p.top-24, pipeWidth+8, 24, 4, "#00ffcc"); drawRoundedRect(p.x-4, p.bottom, pipeWidth+8, 24, 4, "#00ffcc");
        if(!p.coinTaken && coinImg.complete){ 
            ctx.drawImage(coinImg, p.x+pipeWidth/2-16, p.coinY-16 + Math.sin(p.coinFloat)*6, 32, 32);
        }
    });

    if (gameState === "PLAYING") {
        birdTrail.forEach((t, index) => {
            ctx.fillStyle = player.isShielded ? "rgba(0, 210, 255, 0.25)" : "rgba(255, 255, 255, 0.3)"; 
            ctx.beginPath(); ctx.arc(t.x, t.y, (index / birdTrail.length) * (player.h/3.5), 0, Math.PI*2); ctx.fill();
        });
    }

    if((gameState === "PLAYING" || gameState === "STARTING" || gameState === "GAMEOVER")){ 
        let activeFrames = preloadedSkinImages[currentSkin];
        if(activeFrames && activeFrames[currentFrame]) {
            ctx.save(); ctx.translate(player.x+player.w/2, player.y+player.h/2); 
            ctx.rotate(Math.min(Math.PI/3, Math.max(-Math.PI/7, player.vel * 0.09))); 
            ctx.drawImage(activeFrames[currentFrame], -player.w/2, -player.h/2, player.w, player.h); ctx.restore(); 
            if(player.isShielded && gameState === "PLAYING") {
                ctx.strokeStyle = "rgba(0, 210, 255, 0.8)"; ctx.lineWidth = 4; ctx.beginPath();
                ctx.arc(player.x + player.w/2, player.y + player.h/2, player.w/1.3, 0, Math.PI*2); ctx.stroke();
            }
        }
    }

    particles.forEach(p => { ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore(); });

    if (gameState === "PLAYING" || gameState === "STARTING") {
        ctx.fillStyle = "white"; ctx.font = "bold 24px sans-serif"; ctx.textAlign = "left"; ctx.fillText("✨ Score: " + score, 25, 45);
        ctx.fillStyle = "#ffd700"; ctx.fillText("🪙 Coins: " + coins, 25, 80);
    }

    if(gameState === "MENU"){
        ctx.fillStyle = "rgba(8, 9, 15, 0.65)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        if(logoImg.complete) ctx.drawImage(logoImg, canvas.width/2 - 180, 110 + Math.sin(menuTimer)*12, 360, 135);
        drawModernButton("PLAY", 140, 340, 200, 55, "PLAY", "#2ecc71", "#27ae60", "#2ecc71", "18px");
        drawModernButton("SHOP_OPEN", 140, 415, 200, 55, "THE SHOP", "#f39c12", "#d35400", "#f39c12", "18px");
        drawModernButton("RANK_OPEN", 140, 490, 200, 55, "LEADERBOARD", "#3498db", "#2980b9", "#3498db", "17px");
    }
    if(gameState === "STARTING") { 
        ctx.fillStyle = "white"; ctx.font = "bold 100px sans-serif"; ctx.textAlign = "center"; ctx.fillText(countdown, canvas.width/2, canvas.height/2 + 35);
    }
    
    if(gameState === "SHOP") drawShopUI();
    if(gameState === "LEADERBOARD") drawLeaderboardUI();
    if(gameState === "WATCHING_AD") drawAdUI(); 
    
    if(gameState === "GAMEOVER"){
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        drawRoundedRect(80, 170, 320, 360, 24, "#15171e", "rgba(255,255,255,0.08)", 2);
        ctx.fillStyle = "#ff4757"; ctx.textAlign = "center"; ctx.font = "bold 36px sans-serif"; ctx.fillText("GAME OVER", 240, 235);
        ctx.font = "22px sans-serif"; ctx.fillStyle = "#a0a5b5"; ctx.fillText("Score: " + score, 240, 290); 
        ctx.fillStyle = "#ffd700"; ctx.font = "bold 22px sans-serif"; ctx.fillText("🔥 Best: " + highscore, 240, 335);
        drawModernButton("RESTART", 140, 390, 200, 50, "TRY AGAIN", "#e74c3c", "#c0392b", "#e74c3c", "16px");
        drawModernButton("GO_MENU", 140, 455, 200, 50, "MAIN MENU", "#7f8c8d", "#2c3e50", "#7f8c8d", "16px");
    }

    // INTERAKTIVNI PROZOR UNUTAR CANVAS-A (NEMA NEUGODNIH POP-UPOVA BROWSERA)
    if (nameInputActive) {
        ctx.fillStyle = "rgba(5, 6, 10, 0.93)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawRoundedRect(50, 200, canvas.width - 100, 300, 24, "#161925", "#00ff88", 2);
        ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 24px sans-serif";
        ctx.fillText("NEW HIGH SCORE! 🎉", canvas.width/2, 250);
        ctx.fillStyle = "#a0a5b5"; ctx.font = "16px sans-serif";
        ctx.fillText("Type your name (Click field on PC):", canvas.width/2, 285);
        
        // Polje
        drawRoundedRect(80, 320, canvas.width - 160, 50, 12, "#0c0d14", "rgba(255,255,255,0.15)", 1.5);
        ctx.fillStyle = "#00ff88"; ctx.font = "bold 20px monospace";
        ctx.fillText(currentEnteredName + (Math.floor(menuTimer * 2) % 2 === 0 ? "_" : ""), canvas.width/2, 352);

        drawModernButton("SUBMIT_NAME", 140, 415, 200, 48, "SAVE RECORD", "#00ff88", "#00aa55", "#00ff88", "16px");
    }

    if (flashAlpha > 0) { ctx.save(); ctx.globalAlpha = flashAlpha; ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.restore(); }
    ctx.restore(); 
}

function drawAdUI() {
    ctx.fillStyle = "#0c0d14"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawRoundedRect(30, 80, canvas.width - 60, canvas.height - 160, 24, "#161925");
    ctx.fillStyle = "white"; ctx.font = "bold 24px sans-serif"; ctx.textAlign = "center"; ctx.fillText("Awesome Ad Room", canvas.width/2, 240);
    ctx.fillStyle = "white"; ctx.font = "bold 20px sans-serif"; ctx.fillText(`Reward in: ${adTimer}s`, canvas.width/2, canvas.height/2 + 60);
}

function drawLeaderboardUI() {
    ctx.fillStyle = "#06070b"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawModernButton("RANK_BACK", 30, 25, 95, 40, "BACK", "#e74c3c", "#c0392b", "#e74c3c", "14px");
    ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 30px sans-serif"; ctx.fillText("🏆 HALL OF FAME", canvas.width/2, 105);
    
    for(let i=0; i<10; i++) {
        let y = 160 + i * 46;
        let item = leaderboard[i] || {name: "---", score: 0};
        let cardColor = "rgba(255, 255, 255, 0.02)";
        let strokeColor = "rgba(255, 255, 255, 0.05)";
        
        if (i === 0) { cardColor = "rgba(255, 215, 0, 0.05)"; strokeColor = "#ffd700"; }
        else if (i === 1) { cardColor = "rgba(192, 192, 192, 0.05)"; strokeColor = "#c0c0c0"; }
        else if (i === 2) { cardColor = "rgba(205, 127, 50, 0.05)"; strokeColor = "#cd7f32"; }

        drawRoundedRect(30, y, canvas.width - 60, 38, 10, cardColor, strokeColor, i < 3 ? 1.5 : 1);
        ctx.textAlign = "left";
        if (i === 0) { ctx.fillStyle = "#ffd700"; ctx.font = "bold 16px sans-serif"; ctx.fillText("👑 #1", 45, y + 24); }
        else if (i === 1) { ctx.fillStyle = "#c0c0c0"; ctx.font = "bold 16px sans-serif"; ctx.fillText("🥈 #2", 45, y + 24); }
        else if (i === 2) { ctx.fillStyle = "#cd7f32"; ctx.font = "bold 16px sans-serif"; ctx.fillText("🥉 #3", 45, y + 24); }
        else { ctx.fillStyle = "#696e79"; ctx.font = "bold 14px sans-serif"; ctx.fillText(`    #${i + 1}`, 45, y + 24); }

        ctx.fillStyle = i < 3 ? "white" : "#b0b5c2";
        ctx.font = i < 3 ? "bold 15px monospace" : "14px monospace";
        ctx.fillText(item.name, 110, y + 24);

        ctx.textAlign = "right";
        ctx.fillStyle = i === 0 ? "#ffd700" : (i === 1 ? "#c0c0c0" : (i === 2 ? "#cd7f32" : "white"));
        ctx.font = "bold 16px sans-serif";
        ctx.fillText(item.score + " pts", canvas.width - 45, y + 24);
    }
}

function drawShopUI() {
    ctx.fillStyle = "#07080f"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawModernButton("SHOP_BACK", 28, 27, 90, 40, "BACK", "#e74c3c", "#c0392b", "#e74c3c", "14px");
    ctx.fillStyle = "#ffd700"; ctx.textAlign = "right"; ctx.font = "bold 16px sans-serif"; ctx.fillText(coins + " 🪙", canvas.width - 45, 52);

    let isSkins = (shopTab === "SKINS");
    drawRoundedRect(25, 95, 210, 40, 12, isSkins ? "rgba(0,255,136,0.12)" : "rgba(255,255,255,0.02)");
    drawRoundedRect(245, 95, 210, 40, 12, !isSkins ? "rgba(0,210,255,0.12)" : "rgba(255,255,255,0.02)");
    ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.fillText("BIRD SKINS", 130, 120); ctx.fillText("POWER-UPS", 350, 120);

    let adStatus = getAdStatus();

    if (shopTab === "SKINS") {
        let cx = canvas.width / 2; let cy = 330;
        let pImg = preloadedSkinImages[selectedSkin] ? preloadedSkinImages[selectedSkin][0] : null;
        if(pImg) {
            ctx.save(); ctx.translate(cx, cy + Math.sin(menuTimer * 2.5) * 12); ctx.rotate(Math.sin(menuTimer * 1.5) * 0.1);
            ctx.drawImage(pImg, -64, -64, 128, 128); ctx.restore();
        }

        ctx.fillStyle = "#3498db"; 
        ctx.beginPath(); ctx.moveTo(35, cy); ctx.lineTo(65, cy - 25); ctx.lineTo(65, cy + 25); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(445, cy); ctx.lineTo(415, cy - 25); ctx.lineTo(415, cy + 25); ctx.closePath(); ctx.fill();

        let s = skins[selectedSkin];
        ctx.fillStyle = "white"; ctx.font = "bold 24px sans-serif"; ctx.fillText(s.name, cx, cy + 120);
        ctx.fillStyle = s.unlocked ? "#00ff88" : "#ffd700"; ctx.font = "bold 16px sans-serif";
        ctx.fillText(s.unlocked ? (selectedSkin === currentSkin ? "🟢 EQUIPPED" : "📦 UNLOCKED") : `🔒 PRICE: ${s.cost} 🪙`, cx, cy + 150);

        drawModernButton("WATCH_AD_BTN", 25, 550, canvas.width-50, 55, adStatus.text, "#9b59b6", "#8e44ad", "#9b59b6", "14px", !adStatus.available);

        if(!s.unlocked) drawModernButton("SHOP_ACTION", 25, 625, canvas.width-50, 60, "UNLOCK FOR " + s.cost + " COINS", "#f1c40f", "#f39c12", "#ffd700", "15px");
        else if (selectedSkin !== currentSkin) drawModernButton("SHOP_ACTION", 25, 625, canvas.width-50, 60, "EQUIP THIS BIRD", "#2ecc71", "#27ae60", "#2ecc71", "15px");
        else { drawRoundedRect(25, 625, canvas.width-50, 60, 14, "rgba(255,255,255,0.04)"); ctx.fillStyle = "gray"; ctx.fillText("BIRD ACTIVE", canvas.width/2, 655); }
    } else {
        let sy = 160; 
        drawRoundedRect(25, sy, canvas.width - 50, 240, 24, "rgba(255,255,255,0.02)", hasShieldEquipped ? "#00d2ff" : "rgba(255,255,255,0.06)", 1.5);
        ctx.fillStyle = "white"; ctx.font = "bold 24px sans-serif"; ctx.textAlign = "left"; ctx.fillText("🛡️ Cyber Energy Shield", 50, sy + 45);
        
        ctx.fillStyle = "#8a8f9d"; ctx.font = "14px sans-serif";
        ctx.fillText("• Ultimate safety tech for your next high score run.", 50, sy + 85);
        ctx.fillText("• Absorbs 1 fatal crash into any solid green pipe.", 50, sy + 110);
        ctx.fillText("• Automatically activates a 1-second invincibility state.", 50, sy + 135);
        ctx.fillText("• Single-use item: consumed upon impact breakdown.", 50, sy + 160);

        ctx.fillStyle = hasShieldEquipped ? "#00d2ff" : "#ffd700"; ctx.font = "bold 16px sans-serif";
        ctx.fillText(hasShieldEquipped ? "🛡️ SYSTEM ONLINE & READY" : `PRICE: ${shieldCost} COINS`, 50, sy + 205);

        drawModernButton("WATCH_AD_BTN", 25, 550, canvas.width-50, 55, adStatus.text, "#9b59b6", "#8e44ad", "#9b59b6", "14px", !adStatus.available);
        
        if(hasShieldEquipped) { drawRoundedRect(25, 625, canvas.width-50, 60, 14, "rgba(0,210,255,0.1)"); ctx.fillStyle = "#00d2ff"; ctx.textAlign = "center"; ctx.fillText("🛡️ SHIELD READY IN STORAGE", canvas.width/2, 655); }
        else drawModernButton("BUY_SHIELD", 25, 625, canvas.width-50, 60, "BUY ENERGY SHIELD 🛡️", "#00d2ff", "#0086b3", "#00d2ff", "16px", coins < shieldCost);
    }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
